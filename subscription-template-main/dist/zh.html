<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="color-scheme" content="dark light"/>
<title>Subscription</title>
<style>
:root{--bg:#0f0f0f;--card-bg:#1a1a1a;--text:#e0e0e0;--accent:#6c5ce7;--border:#2a2a2a;--muted:#888}
@media(prefers-color-scheme:light){:root{--bg:#f5f5f5;--card-bg:#fff;--text:#222;--border:#ddd;--muted:#666}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:24px;margin:12px;width:100%;max-width:640px}
h1{font-size:1.5rem;margin-bottom:8px;color:var(--accent)}
.sub-info{color:var(--muted);font-size:0.9rem;margin-bottom:16px}
.sub-link{display:block;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:monospace;font-size:0.85rem;word-break:break-all;color:var(--accent);text-decoration:none;margin:8px 0}
.sub-link:hover{background:var(--border)}
.copy-btn{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:0.85rem;margin:4px}
.copy-btn:hover{opacity:0.9}
section{margin:16px 0}
h2{font-size:1.1rem;margin-bottom:12px;color:var(--text)}
.qr{display:inline-block;background:#fff;padding:8px;border-radius:8px;margin:8px}
pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;font-size:0.8rem}
footer{color:var(--muted);font-size:0.8rem;margin-top:auto;padding:20px}
</style>
</head>
<body>
<div class="card">
  <h1 id="title">Subscription</h1>
  <p class="sub-info" id="info">Loading...</p>
  <div id="content">Loading subscription data...</div>
</div>
<footer>Powered by <strong>PasarGuard-for-singbox</strong></footer>
<script>
(async function(){
  const base = window.location.origin + '/{{ subscription_path }}/';
  const token = window.location.pathname.split('/').pop();
  if(!token){document.getElementById('content').textContent='No token provided';return;}
  try{
    const res = await fetch(base + token,{headers:{Accept:'application/json'}});
    if(!res.ok) throw new Error(res.status);
    const data = await res.json();
    document.getElementById('title').textContent = data.remark || data.email || 'Subscription';
    document.getElementById('info').textContent = `Expires: ${data.expire || '∞'}  |  Used: ${data.used_traffic || 0}/${data.data_limit || '∞'}`;
    let html = '';
    if(data.links && data.links.length){
      html += '<section><h2>Connection Links</h2>';
      data.links.forEach(l => {
        html += `<a class="sub-link" href="${l}">${l.substring(0,80)}...</a>`;
        html += `<button class="copy-btn" onclick="navigator.clipboard.writeText('${l.replace(/'/g,"\\'")}')">Copy</button>`;
      });
      html += '</section>';
    }
    if(data.configs){
      Object.entries(data.configs).forEach(([fmt,cfg]) => {
        html += `<section><h2>${fmt.toUpperCase()} Config</h2><pre>${JSON.stringify(cfg,null,2)}</pre></section>`;
      });
    }
    document.getElementById('content').innerHTML = html || 'No subscription data.';
  }catch(e){
    document.getElementById('content').textContent = 'Failed to load: ' + e.message;
  }
})();
</script>
</body>
</html>
